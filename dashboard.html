<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automation Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent-primary: #38bdf8;
            --accent-success: #22c55e;
            --accent-danger: #ef4444;
            --accent-warning: #f59e0b;
            --border-color: #475569;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .logo { font-size: 1.8rem; color: var(--accent-primary); }
        .header-actions { display: flex; gap: 1rem; align-items: center; }
        .card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .card-title {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary { background: var(--accent-primary); color: var(--bg-primary); font-weight: 600; }
        .btn-primary:hover { background: #7dd3fc; }
        .btn-success { background: var(--accent-success); color: #fff; }
        .btn-success:hover { background: #16a34a; }
        .btn-danger { background: var(--accent-danger); color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-warning { background: var(--accent-warning); color: #fff; }
        .btn-warning:hover { background: #d97706; }
        .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color); }
        .btn-ghost:hover { background: var(--bg-tertiary); }
        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.8rem; }
        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th { color: var(--text-secondary); font-weight: 600; }
        .status {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-idle { background: var(--bg-tertiary); }
        .status-success { background: var(--accent-success); color: #fff; }
        .status-failed { background: var(--accent-danger); color: #fff; }
        .status-running { background: var(--accent-warning); color: #fff; }
        .status-timeout { background: #9333ea; color: #fff; }
        .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .output {
            background: var(--bg-primary);
            padding: 1rem;
            border-radius: 8px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.85rem;
            margin-top: 1rem;
        }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg-secondary);
            padding: 2rem;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .modal-title { font-size: 1.3rem; }
        .close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }
        .close:hover { color: var(--text-primary); }
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .tab {
            padding: 0.5rem 1rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab.active { color: var(--accent-primary); border-bottom-color: var(--accent-primary); }
        .tag {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            background: var(--bg-tertiary);
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 0.25rem;
        }
        .search-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .search-input {
            flex: 1;
            padding: 0.5rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            background: var(--bg-secondary);
            border-radius: 8px;
            border-left: 4px solid var(--accent-primary);
            z-index: 200;
            animation: slideIn 0.3s ease;
        }
        .toast.success { border-left-color: var(--accent-success); }
        .toast.error { border-left-color: var(--accent-danger); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .stat-card {
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--accent-primary); }
        .stat-label { color: var(--text-secondary); font-size: 0.9rem; }
        .filter-group { display: flex; gap: 0.5rem; align-items: center; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">⚡ Automation Dashboard</h1>
            <div class="header-actions">
                <button class="btn btn-ghost" onclick="showAuthModal()">
                    <span id="auth-status">Login</span>
                </button>
                <button class="btn btn-primary" onclick="showModal('create')">+ New Task</button>
            </div>
        </header>

        <div class="stats" id="stats"></div>

        <div class="search-bar">
            <input type="text" class="search-input" placeholder="Search tasks..." id="searchInput" oninput="filterTasks()">
            <select id="statusFilter" onchange="filterTasks()">
                <option value="">All Status</option>
                <option value="idle">Idle</option>
                <option value="running">Running</option>
                <option value="success">Success</option>
                <option value="failed">Failed</option>
            </select>
            <button class="btn btn-ghost" onclick="refreshTasks()">🔄 Refresh</button>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Tasks</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Tags</th>
                        <th>Type</th>
                        <th>Status</th>
                        <th>Last Run</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tasksTable"></tbody>
            </table>
        </div>

        <div class="card" id="outputCard" style="display: none;">
            <div class="card-header">
                <h2 class="card-title">Output: <span id="outputTaskName"></span></h2>
                <button class="btn btn-ghost btn-sm" onclick="closeOutput()">× Close</button>
            </div>
            <div class="output" id="taskOutput"></div>
        </div>

        <div class="card" id="logsCard" style="display: none;">
            <div class="card-header">
                <h2 class="card-title">Execution History: <span id="logsTaskName"></span></h2>
                <button class="btn btn-ghost btn-sm" onclick="closeLogs()">× Close</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Status</th>
                        <th>Started</th>
                        <th>Duration</th>
                        <th>Trigger</th>
                    </tr>
                </thead>
                <tbody id="logsTable"></tbody>
            </table>
        </div>
    </div>

    <!-- Create Task Modal -->
    <div class="modal" id="createModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">New Task</h2>
                <button class="close" onclick="hideModal('create')">×</button>
            </div>
            <form id="createForm" onsubmit="createTask(event)">
                <div class="form-group">
                    <label class="form-label">Task Name *</label>
                    <input type="text" name="name" placeholder="my-task" required pattern="[a-zA-Z0-9_-]+">
                </div>
                <div class="form-group">
                    <label class="form-label">Command *</label>
                    <textarea name="command" placeholder="tar -czf backup.tar.gz ./data" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <input type="text" name="description" placeholder="Optional description">
                </div>
                <div class="form-group">
                    <label class="form-label">Tags (comma separated)</label>
                    <input type="text" name="tags" placeholder="backup, daily, important">
                </div>
                <div class="form-group">
                    <label class="form-label">Timeout (seconds)</label>
                    <input type="number" name="timeout" value="300" min="1" max="3600">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Create Task</button>
            </form>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Authentication</h2>
                <button class="close" onclick="hideModal('auth')">×</button>
            </div>
            <div id="authForm">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="authUsername" placeholder="admin">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="authPassword" placeholder="••••••••">
                </div>
                <button type="button" class="btn btn-primary" style="width: 100%" onclick="login()">Login</button>
                <p style="text-align: center; margin-top: 1rem; color: var(--text-secondary);">
                    Default: admin / admin123
                </p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast" style="display: none;"></div>

    <script>
        const API = window.location.origin;
        let token = localStorage.getItem('automation_token') || '';
        let tasks = [];
        let currentUser = null;

        async function api(endpoint, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
                ...options.headers,
            };
            const response = await fetch(`${API}${endpoint}`, { ...options, headers });
            if (response.status === 401) {
                token = '';
                localStorage.removeItem('automation_token');
                currentUser = null;
                updateAuthStatus();
                throw new Error('Unauthorized');
            }
            if (!response.ok) {
                const error = await response.json().catch(() => ({ detail: 'Request failed' }));
                throw new Error(error.detail || 'Request failed');
            }
            if (response.status === 204) return null;
            return response.json();
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function updateAuthStatus() {
            const authStatus = document.getElementById('auth-status');
            authStatus.textContent = currentUser ? `Logged in as ${currentUser.username}` : 'Login';
        }

        async function login() {
            const username = document.getElementById('authUsername').value;
            const password = document.getElementById('authPassword').value;
            try {
                const data = await api('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ username, password }),
                });
                token = data.access_token;
                localStorage.setItem('automation_token', token);
                currentUser = { username };
                updateAuthStatus();
                hideModal('auth');
                showToast('Login successful', 'success');
                refreshTasks();
            } catch (e) {
                showToast('Login failed: ' + e.message, 'error');
            }
        }

        async function refreshTasks() {
            try {
                tasks = await api('/tasks?active_only=false');
                renderTasks();
                updateStats();
            } catch (e) {
                showToast('Failed to load tasks', 'error');
            }
        }

        function filterTasks() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            renderTasks(search, status);
        }

        function renderTasks(search = '', status = '') {
            const filtered = tasks.filter(t => {
                const matchSearch = !search || t.name.toLowerCase().includes(search) ||
                    (t.description && t.description.toLowerCase().includes(search));
                const matchStatus = !status || t.status === status;
                return matchSearch && matchStatus;
            });

            const tbody = document.getElementById('tasksTable');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-secondary);">No tasks found</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(t => `
                <tr>
                    <td><strong>${t.name}</strong>${t.description ? `<br><small style="color: var(--text-secondary)">${t.description}</small>` : ''}</td>
                    <td>${(t.tags || []).map(tag => `<span class="tag">${tag.name}</span>`).join('')}</td>
                    <td>${t.task_type}</td>
                    <td><span class="status status-${t.status}">${t.status}</span></td>
                    <td>${t.last_run ? new Date(t.last_run).toLocaleString() : 'Never'}</td>
                    <td class="actions">
                        <button class="btn btn-success btn-sm" onclick="runTask('${t.name}')" title="Run">▶</button>
                        <button class="btn btn-ghost btn-sm" onclick="showOutput('${t.name}')" title="View Output">📄</button>
                        <button class="btn btn-ghost btn-sm" onclick="showLogs('${t.name}')" title="History">📜</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteTask('${t.name}')" title="Delete">🗑</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats() {
            const total = tasks.length;
            const active = tasks.filter(t => t.active).length;
            const success = tasks.filter(t => t.status === 'success').length;
            const failed = tasks.filter(t => t.status === 'failed').length;

            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total Tasks</div></div>
                <div class="stat-card"><div class="stat-value">${active}</div><div class="stat-label">Active</div></div>
                <div class="stat-card"><div class="stat-value" style="color: var(--accent-success)">${success}</div><div class="stat-label">Success</div></div>
                <div class="stat-card"><div class="stat-value" style="color: var(--accent-danger)">${failed}</div><div class="stat-label">Failed</div></div>
            `;
        }

        function showModal(type) { document.getElementById(`${type}Modal`).classList.add('active'); }
        function hideModal(type) { document.getElementById(`${type}Modal`).classList.remove('active'); }
        function showAuthModal() {
            if (token) {
                token = '';
                localStorage.removeItem('automation_token');
                currentUser = null;
                updateAuthStatus();
                showToast('Logged out', 'success');
            } else {
                showModal('auth');
            }
        }

        async function createTask(e) {
            e.preventDefault();
            const form = e.target;
            const data = {
                name: form.name.value,
                command: form.command.value,
                description: form.description.value,
                tags: form.tags.value ? form.tags.value.split(',').map(t => t.trim()) : [],
                timeout: parseInt(form.timeout.value) || 300,
            };
            try {
                await api('/tasks', { method: 'POST', body: JSON.stringify(data) });
                hideModal('create');
                showToast('Task created successfully', 'success');
                refreshTasks();
                form.reset();
            } catch (err) {
                showToast('Error: ' + err.message, 'error');
            }
        }

        async function runTask(name) {
            try {
                showToast(`Running task: ${name}...`, 'info');
                const result = await api(`/tasks/${name}/run`, { method: 'POST' });
                showToast(`Task ${result.status}`, result.status === 'success' ? 'success' : 'error');
                refreshTasks();
                if (result.output) {
                    document.getElementById('outputCard').style.display = 'block';
                    document.getElementById('outputTaskName').textContent = name;
                    document.getElementById('taskOutput').textContent = result.output;
                }
            } catch (err) {
                showToast('Error: ' + err.message, 'error');
            }
        }

        async function showOutput(name) {
            try {
                const task = await api(`/tasks/${name}`);
                document.getElementById('outputCard').style.display = 'block';
                document.getElementById('outputTaskName').textContent = name;
                document.getElementById('taskOutput').textContent = task.last_output || 'No output available';
            } catch (err) {
                showToast('Error: ' + err.message, 'error');
            }
        }

        function closeOutput() { document.getElementById('outputCard').style.display = 'none'; }

        async function showLogs(name) {
            try {
                const logs = await api(`/tasks/${name}/logs`);
                document.getElementById('logsCard').style.display = 'block';
                document.getElementById('logsTaskName').textContent = name;
                document.getElementById('logsTable').innerHTML = logs.map(log => `
                    <tr>
                        <td>${log.id}</td>
                        <td><span class="status status-${log.status}">${log.status}</span></td>
                        <td>${new Date(log.started_at).toLocaleString()}</td>
                        <td>${log.duration_ms ? log.duration_ms + 'ms' : '-'}</td>
                        <td>${log.trigger_type}</td>
                    </tr>
                `).join('') || '<tr><td colspan="5" style="text-align: center">No logs found</td></tr>';
            } catch (err) {
                showToast('Error: ' + err.message, 'error');
            }
        }

        function closeLogs() { document.getElementById('logsCard').style.display = 'none'; }

        async function deleteTask(name) {
            if (confirm(`Delete task '${name}'?`)) {
                try {
                    await api(`/tasks/${name}`, { method: 'DELETE' });
                    showToast('Task deleted', 'success');
                    refreshTasks();
                } catch (err) {
                    showToast('Error: ' + err.message, 'error');
                }
            }
        }

        if (token) {
            api('/users/me').then(user => { currentUser = user; updateAuthStatus(); }).catch(() => {});
        }
        refreshTasks();
    </script>
</body>
</html>
